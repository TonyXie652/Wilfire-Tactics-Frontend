<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUIDE SYS · Tick Logic Flow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Orbitron:wght@400;700;900&display=swap');
:root {
  --bg: #0D1117;
  --bg2: #0a0e14;
  --grid: rgba(30,60,90,0.35);
  --border-dim: rgba(40,100,140,0.4);
  --border-mid: rgba(60,160,200,0.6);
  --text-dim: rgba(140,180,210,0.55);
  --text-mid: rgba(180,210,230,0.8);
  --text-hi: rgba(220,240,255,0.95);
  --cyan: #00e5ff;
  --cyan-dim: rgba(0,229,255,0.15);
  --cyan-glow: rgba(0,229,255,0.4);
  --orange: #ff8c00;
  --orange-dim: rgba(255,140,0,0.15);
  --orange-glow: rgba(255,140,0,0.45);
  --green: #00ff88;
  --green-glow: rgba(0,255,136,0.4);
  --red: #ff3d3d;
  --red-dim: rgba(255,61,61,0.12);
  --red-glow: rgba(255,61,61,0.4);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-mid);
  position: relative;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 40px 40px;
}
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 0%, rgba(0,80,120,0.18) 0%, transparent 70%);
}
#app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100vh; max-width: 1600px;
  margin: 0 auto; padding: 0 32px;
}
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0 10px; border-bottom: 1px solid var(--border-dim);
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
.sys-label {
  font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 5px;
  color: var(--text-dim); text-transform: uppercase;
}
.sys-title {
  font-family: 'Orbitron', sans-serif; font-size: 17px; font-weight: 900;
  letter-spacing: 3px; color: var(--cyan); text-shadow: 0 0 20px var(--cyan-glow);
}
.status-pill {
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,229,255,0.05); border: 1px solid var(--border-dim);
  padding: 5px 12px; font-size: 9px; letter-spacing: 2px; color: var(--text-dim);
}
.status-dot {
  width: 6px; height: 6px; background: var(--cyan); box-shadow: 0 0 8px var(--cyan);
  animation: blink-dot 2s ease-in-out infinite;
}
@keyframes blink-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
#step-counter {
  font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 2px; color: var(--cyan);
}
#flow-strip {
  display: flex; align-items: center; justify-content: center; padding: 14px 0 10px;
}
.flow-node {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 160px; height: 72px; border: 1px solid var(--border-mid);
  background: rgba(10,18,28,0.92); cursor: pointer; transition: all 0.25s; position: relative;
}
.flow-node::before, .flow-node::after {
  content: ''; position: absolute; width: 10px; height: 10px;
  border-color: rgba(0,229,255,0.5); border-style: solid;
}
.flow-node::before { top: -1px; left: -1px; border-width: 1.5px 0 0 1.5px; }
.flow-node::after { bottom: -1px; right: -1px; border-width: 0 1.5px 1.5px 0; }
.flow-node-id {
  font-family: 'Orbitron', sans-serif; font-size: 7px; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 4px;
}
.flow-node-title {
  font-size: 11px; font-weight: 700; color: var(--text-hi); letter-spacing: 0.3px; text-align: center; line-height: 1.2;
}
.flow-node-tag {
  font-size: 7px; letter-spacing: 1.5px; margin-top: 4px; padding: 1px 5px; border: 1px solid; opacity: 0.6;
}
.flow-arrow { display: flex; align-items: center; justify-content: center; width: 40px; position: relative; }
.flow-arrow svg { width: 40px; height: 20px; overflow: visible; }
.flow-arrow-line { stroke: rgba(0,180,220,0.35); stroke-width: 1.5; fill: none; transition: stroke 0.3s, stroke-width 0.3s; }
.flow-arrow-head { fill: rgba(0,180,220,0.6); transition: fill 0.3s; }
.flow-node.active {
  border-color: var(--orange); background: var(--orange-dim);
  box-shadow: 0 0 12px var(--orange-glow), 0 0 30px rgba(255,140,0,0.12);
}
.flow-node.active .flow-node-title { color: var(--orange); }
.flow-node.visited { border-color: rgba(0,229,255,0.5); background: rgba(0,229,255,0.04); }
.flow-node.visited .flow-node-title { color: var(--cyan); }
.flow-node.panic {
  border-color: var(--red); background: var(--red-dim); box-shadow: 0 0 14px var(--red-glow);
  animation: panic-flicker 0.4s steps(2) infinite;
}
@keyframes panic-flicker { 0% { opacity: 1; } 50% { opacity: 0.78; } }
.flow-arrow.active .flow-arrow-line { stroke: var(--orange); stroke-width: 2.5; }
.flow-arrow.active .flow-arrow-head { fill: var(--orange); }
.flow-arrow.visited .flow-arrow-line {
  stroke: rgba(0,229,255,0.6); stroke-width: 2; stroke-dasharray: 4 3; animation: dash-flow 0.6s linear infinite;
}
.flow-arrow.visited .flow-arrow-head { fill: rgba(0,229,255,0.7); }
@keyframes dash-flow { to { stroke-dashoffset: -14; } }
main {
  flex: 1; display: grid; grid-template-columns: 1fr 320px; gap: 24px; padding: 10px 0; min-height: 0;
}
#canvas-panel, #progress-panel {
  display: flex; flex-direction: column; border: 1px solid var(--border-dim);
  background: rgba(10,16,24,0.85); position: relative; overflow: hidden; min-height: 0;
}
#canvas-panel::before, #progress-panel::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan-dim), transparent);
}
.canvas-header, .progress-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 16px; border-bottom: 1px solid var(--border-dim); background: rgba(0,229,255,0.03);
}
.canvas-header-left { display: flex; align-items: center; gap: 10px; }
.panel-header-icon {
  width: 8px; height: 8px; background: var(--cyan);
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
}
.panel-header-text {
  font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase;
}
#step-num {
  font-family: 'Orbitron', sans-serif; font-size: 9px; letter-spacing: 3px; color: var(--orange);
}
#step-name {
  font-family: 'Orbitron', sans-serif; font-size: 13px; font-weight: 700; color: var(--orange); text-shadow: 0 0 15px var(--orange-glow); letter-spacing: 1px;
}
#canvas-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 12px; min-height: 0; }
#logic-canvas {
  display: block; width: 100%; height: 100%; background: rgba(0,0,0,0.3);
  border: 1px solid rgba(0,229,255,0.08);
}
.progress-track {
  flex: 1; overflow-y: auto; padding: 8px 10px; display: flex; flex-direction: column; gap: 4px;
}
.progress-item {
  display: flex; align-items: center; gap: 8px; padding: 6px 8px; border: 1px solid transparent; transition: all 0.3s; cursor: pointer;
}
.progress-item:hover { border-color: var(--border-dim); background: rgba(0,229,255,0.03); }
.progress-item.done { border-color: rgba(0,229,255,0.2); background: rgba(0,229,255,0.03); }
.progress-item.current { border-color: var(--orange); background: var(--orange-dim); }
.prog-idx { font-family: 'Orbitron', sans-serif; font-size: 8px; color: var(--text-dim); min-width: 18px; }
.prog-dot { width: 6px; height: 6px; border: 1px solid var(--text-dim); }
.progress-item.done .prog-dot { background: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 6px var(--cyan-glow); }
.progress-item.current .prog-dot { background: var(--orange); border-color: var(--orange); box-shadow: 0 0 6px var(--orange-glow); animation: blink-dot 0.8s infinite; }
.prog-label { font-size: 9px; color: var(--text-dim); transition: color 0.3s; letter-spacing: 0.3px; flex: 1; }
.progress-item.done .prog-label { color: var(--text-mid); }
.progress-item.current .prog-label { color: var(--orange); }
.prog-tag { margin-left: auto; font-size: 7px; letter-spacing: 1.5px; padding: 1px 5px; border: 1px solid; opacity: 0.7; }
#step-description { padding: 10px 14px; border-top: 1px solid var(--border-dim); }
#desc-title { font-family: 'Orbitron', sans-serif; font-size: 8px; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 6px; }
#desc-text { font-size: 9px; line-height: 1.6; color: var(--text-dim); }
#desc-text.has-content { color: var(--text-mid); }
footer {
  display: flex; align-items: center; justify-content: space-between; padding: 10px 0 14px; border-top: 1px solid var(--border-dim);
}
.footer-left { display: flex; align-items: center; gap: 6px; font-size: 9px; color: var(--text-dim); letter-spacing: 1.5px; }
kbd {
  display: inline-flex; align-items: center; justify-content: center;
  background: rgba(40,80,110,0.3); border: 1px solid var(--border-mid); padding: 2px 7px;
  font-family: 'JetBrains Mono', monospace; font-size: 8px; color: var(--text-mid); min-width: 24px;
}
.controls { display: flex; gap: 8px; align-items: center; }
.btn {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; padding: 7px 18px;
  border: 1px solid; background: transparent; cursor: pointer; text-transform: uppercase; transition: all 0.2s; position: relative; overflow: hidden;
}
.btn::after { content: ''; position: absolute; inset: 0; background: currentColor; opacity: 0; transition: opacity 0.2s; }
.btn:hover::after { opacity: 0.07; }
.btn-primary { color: var(--orange); border-color: var(--orange); }
.btn-primary:hover { box-shadow: 0 0 16px var(--orange-glow), inset 0 0 16px rgba(255,140,0,0.05); text-shadow: 0 0 8px var(--orange-glow); }
.btn-secondary { color: var(--text-dim); border-color: var(--border-dim); }
.btn-secondary:hover { color: var(--cyan); border-color: var(--cyan); }
.btn-prev { color: var(--cyan); border-color: var(--cyan); }
.btn-prev:hover { box-shadow: 0 0 16px var(--cyan-glow), inset 0 0 16px rgba(0,229,255,0.05); text-shadow: 0 0 8px var(--cyan-glow); }
.btn-prev:disabled, .btn-primary:disabled {
  color: var(--border-dim); border-color: var(--border-dim); cursor: not-allowed; box-shadow: none; text-shadow: none;
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-left">
      <div class="sys-label">EVACUATION INTELLIGENCE SYSTEM</div>
      <div class="sys-title">GUIDE · TICK LOGIC FLOW</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px">
      <div class="status-pill"><div class="status-dot"></div><span>SYS_ONLINE</span></div>
      <div id="step-counter">STEP 0 / 6</div>
    </div>
  </header>
  <div id="flow-strip"></div>
  <main>
    <div id="canvas-panel">
      <div class="canvas-header">
        <div class="canvas-header-left">
          <div class="panel-header-icon"></div>
          <div class="panel-header-text">ACTIVE NODE</div>
        </div>
        <div>
          <span id="step-num" style="margin-right:12px">AWAITING</span>
          <span id="step-name" style="color:var(--text-dim);text-shadow:none">— — —</span>
        </div>
      </div>
      <div id="canvas-body"><canvas id="logic-canvas"></canvas></div>
    </div>
    <div id="progress-panel">
      <div class="progress-header">
        <div class="panel-header-icon" style="background:var(--text-dim)"></div>
        <div class="panel-header-text">LOGIC CHAIN</div>
      </div>
      <div class="progress-track" id="progress-track"></div>
      <div id="step-description">
        <div id="desc-title">DESCRIPTION</div>
        <div id="desc-text">Click a node or press SPACE to begin.</div>
      </div>
    </div>
  </main>
  <footer>
    <div class="footer-left">
      <kbd>←</kbd> prev · <kbd>SPACE</kbd> / <kbd>→</kbd> next · <kbd>R</kbd> reset
    </div>
    <div class="controls">
      <button class="btn btn-secondary" id="btn-reset">↺ RESET</button>
      <button class="btn btn-prev" id="btn-prev">‹ PREV</button>
      <button class="btn btn-primary" id="btn-next">NEXT ›</button>
    </div>
  </footer>
</div>
<script>
(() => {
'use strict';
const STEPS = [
  { id:0, num:'STEP_01', name:'SURVIVAL CHECK', color:'#00ff88', glowColor:'rgba(0,255,136,0.4)', tag:'GATE', tagColor:'#00ff88', desc:'Check if the guide agent is still alive. Dead agents are removed from the tick cycle.' },
  { id:1, num:'STEP_02', name:'CLOUD DECISION', color:'#4488ff', glowColor:'rgba(68,136,255,0.4)', tag:'CLOUD', tagColor:'#4488ff', desc:'Query cloud for navigation commands. Falls back to local pathfinding if cloud is unavailable.' },
  { id:2, num:'STEP_03', name:'REPATH TRIGGER', color:'#ffe600', glowColor:'rgba(255,230,0,0.4)', tag:'PERF', tagColor:'#ffe600', desc:'Check the needsRepath flag. Skip recalculation if the current path is still valid.' },
  { id:3, num:'STEP_04', name:'A* ROUTING ENGINE', color:'#00e5ff', glowColor:'rgba(0,229,255,0.4)', tag:'A*', tagColor:'#00e5ff', desc:'Run A* pathfinding on the grid. Expands wavefront, avoids fire tiles, finds shortest safe route.' },
  { id:4, num:'STEP_05', name:'PLAN-B FALLBACK', color:'#ff8c00', glowColor:'rgba(255,140,0,0.4)', tag:'FALLBACK', tagColor:'#ff8c00', desc:'Primary path blocked. Probe alternative safe zones in priority order and lock onto the first viable one.' },
  { id:5, num:'STEP_06', name:'ULTIMATE PANIC MODE', color:'#ff3d3d', glowColor:'rgba(255,61,61,0.4)', tag:'PANIC', tagColor:'#ff3d3d', desc:'No safe path exists. Agent enters panic mode and moves by repulsion from fire.' },
];
const strip = document.getElementById('flow-strip');
const track = document.getElementById('progress-track');
const lc = document.getElementById('logic-canvas');
const ctx = lc.getContext('2d');
let cw = 0, ch = 0, currentStep = -1, raf = null, animT = 0;

function resizeCanvas() {
  const rect = document.getElementById('canvas-body').getBoundingClientRect();
  cw = Math.floor(rect.width - 24);
  ch = Math.floor(rect.height - 24);
  lc.width = cw;
  lc.height = ch;
  lc.style.width = cw + 'px';
  lc.style.height = ch + 'px';
}
function buildFlow() {
  strip.innerHTML = '';
  STEPS.forEach((step, i) => {
    const node = document.createElement('div');
    node.className = 'flow-node';
    node.id = `fnode-${i}`;
    node.innerHTML = `<div class="flow-node-id">NODE_0${i}</div><div class="flow-node-title">${step.name}</div><div class="flow-node-tag" style="color:${step.tagColor};border-color:${step.tagColor}">${step.tag}</div>`;
    node.onclick = () => goToStep(i);
    strip.appendChild(node);
    if (i < STEPS.length - 1) {
      const arrow = document.createElement('div');
      arrow.className = 'flow-arrow';
      arrow.id = `farrow-${i}`;
      arrow.innerHTML = `<svg viewBox="0 0 40 20"><line class="flow-arrow-line" x1="0" y1="10" x2="30" y2="10"/><polygon class="flow-arrow-head" points="28,5 38,10 28,15"/></svg>`;
      strip.appendChild(arrow);
    }
  });
}
function buildTrack() {
  track.innerHTML = '';
  STEPS.forEach((step, i) => {
    const item = document.createElement('div');
    item.className = 'progress-item';
    item.id = `prog-${i}`;
    item.innerHTML = `<span class="prog-idx">${String(i + 1).padStart(2, '0')}</span><span class="prog-dot"></span><span class="prog-label">${step.name}</span><span class="prog-tag" style="color:${step.tagColor};border-color:${step.tagColor}">${step.tag}</span>`;
    item.onclick = () => goToStep(i);
    track.appendChild(item);
  });
}
function updateUi() {
  STEPS.forEach((step, i) => {
    const node = document.getElementById(`fnode-${i}`);
    const item = document.getElementById(`prog-${i}`);
    if (!node || !item) return;
    node.classList.remove('active', 'visited', 'panic');
    item.classList.remove('done', 'current');
    if (i < currentStep) {
      node.classList.add('visited');
      item.classList.add('done');
    }
    if (i === currentStep) {
      node.classList.add(i === 5 ? 'panic' : 'active');
      item.classList.add('current');
    }
    if (i < STEPS.length - 1) {
      const arrow = document.getElementById(`farrow-${i}`);
      if (!arrow) return;
      arrow.classList.remove('active', 'visited');
      if (i < currentStep) arrow.classList.add('visited');
      if (i === currentStep - 1) arrow.classList.add('active');
    }
  });
  const desc = document.getElementById('desc-text');
  const stepName = document.getElementById('step-name');
  const stepNum = document.getElementById('step-num');
  const counter = document.getElementById('step-counter');
  if (currentStep < 0) {
    desc.textContent = 'Click a node or press SPACE to begin.';
    desc.classList.remove('has-content');
    stepName.textContent = '— — —';
    stepName.style.color = 'var(--text-dim)';
    stepName.style.textShadow = 'none';
    stepNum.textContent = 'AWAITING';
    counter.textContent = `STEP 0 / ${STEPS.length}`;
  } else {
    const step = STEPS[currentStep];
    desc.textContent = step.desc;
    desc.classList.add('has-content');
    stepName.textContent = step.name;
    stepName.style.color = step.color;
    stepName.style.textShadow = `0 0 12px ${step.glowColor}`;
    stepNum.textContent = step.num;
    counter.textContent = `STEP ${currentStep + 1} / ${STEPS.length}`;
  }
  document.getElementById('btn-prev').disabled = currentStep < 0;
  document.getElementById('btn-next').disabled = currentStep >= STEPS.length - 1;
}
function draw() {
  ctx.clearRect(0, 0, cw, ch);
  if (currentStep < 0) return;
  const step = STEPS[currentStep];
  const pulse = 8 + Math.sin(animT / 12) * 3;
  const x = cw / 2;
  const y = ch / 2;
  const grad = ctx.createRadialGradient(x, y, 0, x, y, 120);
  grad.addColorStop(0, step.glowColor);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, cw, ch);
  ctx.beginPath();
  ctx.arc(x, y, 40 + pulse, 0, Math.PI * 2);
  ctx.fillStyle = step.glowColor;
  ctx.fill();
  ctx.beginPath();
  ctx.arc(x, y, 26, 0, Math.PI * 2);
  ctx.fillStyle = step.color;
  ctx.fill();
  ctx.font = "700 16px Orbitron, sans-serif";
  ctx.textAlign = "center";
  ctx.fillStyle = "#e2e8f0";
  ctx.fillText(step.num, x, y + 6);
  ctx.font = "12px 'JetBrains Mono', monospace";
  ctx.fillStyle = "rgba(226,232,240,0.75)";
  ctx.fillText(step.name, x, y + 72);
  animT += 1;
  raf = requestAnimationFrame(draw);
}
function goToStep(index) {
  currentStep = Math.max(-1, Math.min(index, STEPS.length - 1));
  updateUi();
  cancelAnimationFrame(raf);
  animT = 0;
  draw();
}
function nextStep() { if (currentStep < STEPS.length - 1) goToStep(currentStep + 1); }
function prevStep() { if (currentStep <= 0) goToStep(-1); else goToStep(currentStep - 1); }
function resetAll() { goToStep(-1); }
document.getElementById('btn-next').onclick = nextStep;
document.getElementById('btn-prev').onclick = prevStep;
document.getElementById('btn-reset').onclick = resetAll;
document.addEventListener('keydown', (event) => {
  if (event.key === ' ' || event.key === 'ArrowRight') { event.preventDefault(); nextStep(); }
  if (event.key === 'ArrowLeft') { event.preventDefault(); prevStep(); }
  if (event.key === 'r' || event.key === 'R') resetAll();
});
window.addEventListener('resize', () => { resizeCanvas(); draw(); });
buildFlow();
buildTrack();
resizeCanvas();
resetAll();
})();
</script>
</body>
</html>
